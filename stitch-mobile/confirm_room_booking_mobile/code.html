<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Room Booking Detail</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0bdab8",
                        "background-light": "#f5f8f8",
                        "background-dark": "#10221f",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Top Navigation -->
<div class="flex items-center p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center cursor-pointer">
<span class="material-symbols-outlined text-3xl">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">Room Details</h2>
</div>
<!-- Hero Image Section -->
<div class="@container">
<div class="@[480px]:px-4 @[480px]:py-3">
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden bg-background-light dark:bg-background-dark @[480px]:rounded-xl min-h-64 shadow-2xl" data-alt="Modern high-tech glass corporate boardroom interior" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDZTIsl2SZRhhml7AcQwkVVYp3qy-QYmM1gIhOfWU9PXQ0-0ZWDgVPEbe_6RSkKbR-du_oIRynvFv7K6cYQYJs7osWcB1UbYDqUocpFhLJyOFay9Fp64oyKQZ0Ft7kH8A4H1eUxe2ji_7jOymF3j_TdfJuWBbPTrbf7ySD7qjNXrdaqVzs9CtY6x-zO7HsqSKGAZ2NBT6op8j-BJcgc16WMqdOZ8u1OFic8g8fW7UkgzE382Yph_DlROJeNG0C5APLJKd3C0Ho6CNU");'>
</div>
</div>
</div>
<!-- Room Header Info -->
<div class="px-4 pt-6">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-3xl font-bold leading-tight">Executive Boardroom 4A</h1>
<div class="flex items-center gap-2 mt-2">
<span class="material-symbols-outlined text-primary text-sm">location_on</span>
<p class="text-slate-600 dark:text-primary/70 text-sm font-medium">North Highland HQ • Floor 4</p>
</div>
</div>
<!-- Amenities Chips -->
<div class="px-4 pt-6">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight mb-3">Amenities</h3>
<div class="flex flex-wrap gap-2">
<div class="flex items-center gap-2 bg-slate-200/50 dark:bg-primary/10 px-3 py-2 rounded-lg border border-slate-300 dark:border-primary/20">
<span class="material-symbols-outlined text-primary text-xl">videocam</span>
<span class="text-xs font-medium">4K Video</span>
</div>
<div class="flex items-center gap-2 bg-slate-200/50 dark:bg-primary/10 px-3 py-2 rounded-lg border border-slate-300 dark:border-primary/20">
<span class="material-symbols-outlined text-primary text-xl">wifi</span>
<span class="text-xs font-medium">Gigabit Wifi</span>
</div>
<div class="flex items-center gap-2 bg-slate-200/50 dark:bg-primary/10 px-3 py-2 rounded-lg border border-slate-300 dark:border-primary/20">
<span class="material-symbols-outlined text-primary text-xl">groups</span>
<span class="text-xs font-medium">12 Seats</span>
</div>
<div class="flex items-center gap-2 bg-slate-200/50 dark:bg-primary/10 px-3 py-2 rounded-lg border border-slate-300 dark:border-primary/20">
<span class="material-symbols-outlined text-primary text-xl">tv</span>
<span class="text-xs font-medium">Smart Display</span>
</div>
</div>
</div>
<!-- Time Slot Picker -->
<div class="px-4 pt-8">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight mb-4">Select Time Slot</h3>
<div class="grid grid-cols-2 gap-3">
<button class="flex flex-col items-center justify-center p-4 rounded-xl border border-primary bg-primary/10 ring-2 ring-primary">
<span class="text-xs font-semibold text-primary uppercase">Morning</span>
<span class="text-slate-900 dark:text-white font-bold">09:00 - 10:00 AM</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-xl border border-slate-300 dark:border-primary/20 bg-white/5 dark:bg-white/5">
<span class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase">Mid-day</span>
<span class="text-slate-900 dark:text-white font-bold">11:00 - 12:00 PM</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-xl border border-slate-300 dark:border-primary/20 bg-white/5 dark:bg-white/5 opacity-50 cursor-not-allowed">
<span class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase">Lunch</span>
<span class="text-slate-900 dark:text-white font-bold line-through">01:00 - 02:00 PM</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-xl border border-slate-300 dark:border-primary/20 bg-white/5 dark:bg-white/5">
<span class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase">Afternoon</span>
<span class="text-slate-900 dark:text-white font-bold">03:00 - 04:00 PM</span>
</button>
</div>
</div>
<!-- Booking Details Summary -->
<div class="mt-8 mx-4 p-4 rounded-xl bg-slate-200/50 dark:bg-primary/5 border border-slate-300 dark:border-primary/10">
<div class="flex justify-between items-center mb-2">
<span class="text-sm text-slate-600 dark:text-slate-400">Selected Date</span>
<span class="text-sm font-bold text-slate-900 dark:text-white">Oct 24, 2023</span>
</div>
<div class="flex justify-between items-center">
<span class="text-sm text-slate-600 dark:text-slate-400">Total Duration</span>
<span class="text-sm font-bold text-slate-900 dark:text-white">1 Hour</span>
</div>
</div>
<!-- Action Button -->
<div class="p-4 mt-auto mb-6">
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-4 rounded-xl transition-colors shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
<span class="material-symbols-outlined">check_circle</span>
                Confirm Booking
            </button>
</div>
<!-- Map Location (Small) -->
<div class="px-4 pb-12">
<div class="h-32 w-full rounded-xl overflow-hidden relative">
<img alt="Office floor map" class="w-full h-full object-cover grayscale opacity-50" data-alt="Monochrome office floor plan map highlight" data-location="Atlanta" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDxNuaBHp6OBhbazdvX8QWN3GgZSeSsGxJvDyEWIs1-pd7al-1SijtsrAMmlI0RK1Ydjg12NpDGO9XY8N4xHtedXgJWvmfb-KLcO_iscWCUExrLTIqBg0gOmWMNBLS5p7zPc_mdwu5iMmuWlnFZYL-N_VMIfpa6UN-Zaqr1HY-b3zcvcBGNPXcP_V2WvMmF1CJSx97wBO6I3-YnbD1yFIBK8lHYCn-XiadaCmOpYihiW6NtmFwPyflWwMZALF-pjGn-854gQR2CqeA"/>
<div class="absolute inset-0 flex items-center justify-center">
<div class="bg-primary p-2 rounded-full animate-pulse">
<span class="material-symbols-outlined text-background-dark">my_location</span>
</div>
</div>
</div>
</div>
</div>
</body></html>
