<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Mobile Registration Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1183d4",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101a22",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="font-display bg-background-light dark:bg-background-dark min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<div class="px-4 sm:px-10 md:px-40 flex flex-1 justify-center py-5">
<div class="layout-content-container flex flex-col w-full max-w-[480px] mx-auto bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden flex-1 h-full min-h-[600px]">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-6 py-4 bg-white dark:bg-slate-900">
<div class="flex items-center gap-3 text-slate-900 dark:text-slate-100">
<div class="size-6 text-primary flex items-center justify-center">
<span class="material-symbols-outlined text-2xl">business</span>
</div>
<h2 class="text-lg font-bold leading-tight tracking-[-0.015em]">North Highland Access</h2>
</div>
</header>
<div class="flex flex-col flex-1 p-6 gap-8 overflow-y-auto">
<div class="flex flex-col gap-2 text-center items-center mt-4">
<div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mb-2 text-primary">
<span class="material-symbols-outlined text-3xl">how_to_reg</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-2xl font-bold leading-tight">Welcome Aboard</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal leading-relaxed max-w-sm">
                                Employee attendance and parking reservation system.
                            </p>
</div>
<div class="flex flex-col bg-slate-50 dark:bg-slate-800/50 rounded-xl p-5 border border-slate-100 dark:border-slate-800">
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-primary mt-0.5">mail_lock</span>
<div class="flex flex-col gap-1">
<p class="text-slate-900 dark:text-slate-100 text-base font-semibold leading-tight tracking-[-0.015em]">Invite Only Registration</p>
<p class="text-slate-600 dark:text-slate-400 text-sm font-normal leading-normal">
                                        Your account has been pre-configured. Please review your email below to complete the setup process.
                                    </p>
</div>
</div>
</div>
<div class="flex flex-col gap-6 mt-2">
<label class="flex flex-col w-full gap-2">
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal ml-1">Company Email</p>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400">email</span>
<input class="form-input flex w-full min-w-0 resize-none overflow-hidden rounded-lg text-slate-700 dark:text-slate-300 focus:outline-0 focus:ring-0 border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 h-12 pl-12 pr-4 text-base font-normal leading-normal opacity-80 cursor-not-allowed" disabled="" value="employee@northhighland.com"/>
</div>
<p class="text-xs text-slate-500 dark:text-slate-400 ml-1">This email is locked as it was used for your invitation.</p>
</label>
<div class="flex flex-col gap-3 pt-4">
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-5 bg-primary hover:bg-primary/90 transition-colors text-white text-base font-bold leading-normal tracking-wide shadow-sm">
<span class="truncate">Complete Setup</span>
</button>
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal">
<span class="truncate">Not your email? Contact IT</span>
</button>
</div>
</div>
</div>
<footer class="p-6 border-t border-slate-100 dark:border-slate-800 text-center bg-white dark:bg-slate-900">
<p class="text-xs text-slate-400 dark:text-slate-500">Secure access provided by North Highland IT</p>
</footer>
</div>
</div>
</div>
</div>
</body></html>
