<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>North Highland Verification</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0bdab8",
                        "background-light": "#f5f8f8",
                        "background-dark": "#10221f",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="relative flex h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-hidden">
<!-- TopAppBar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center cursor-pointer">
<span class="material-symbols-outlined" style="font-size: 24px;">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Verification</h2>
</div>
<!-- Main Content -->
<div class="flex-1 flex flex-col items-center justify-center px-6">
<!-- Status Indicator -->
<div class="flex flex-col items-center gap-6">
<div class="w-24 h-24 rounded-full bg-primary/20 flex items-center justify-center">
<div class="w-16 h-16 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-background-dark" style="font-size: 40px; font-weight: 700;">check</span>
</div>
</div>
<div class="space-y-2 text-center">
<h4 class="text-primary text-sm font-bold uppercase tracking-widest">Success</h4>
<h2 class="text-slate-900 dark:text-white tracking-tight text-3xl font-bold leading-tight">QR Code Verified</h2>
</div>
</div>
<!-- Illustration / Visual Element -->
<div class="w-full max-w-xs mt-12 mb-8">
<div class="aspect-square w-full rounded-2xl bg-gradient-to-br from-primary/10 to-primary/5 flex items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 opacity-20" data-alt="Abstract geometric dot pattern in teal" style="background-image: radial-gradient(circle at 2px 2px, #0bdab8 1px, transparent 0); background-size: 24px 24px;"></div>
<div class="z-10 bg-background-dark/80 backdrop-blur-sm p-6 rounded-xl border border-primary/20 shadow-xl">
<span class="material-symbols-outlined text-primary" style="font-size: 64px;">qr_code_2</span>
</div>
</div>
</div>
<!-- Description -->
<div class="max-w-sm">
<p class="text-slate-600 dark:text-slate-300 text-base font-normal leading-relaxed text-center">
                Your <span class="font-semibold text-primary">@northhighland.com</span> account has been identified. Let's finish setting up your profile.
            </p>
</div>
</div>
<!-- Bottom Actions -->
<div class="p-6 pb-10 space-y-4">
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-4 rounded-xl transition-colors shadow-lg shadow-primary/20">
            Continue to Profile
        </button>
<div class="h-1 bg-slate-800/20 dark:bg-slate-100/10 w-32 mx-auto rounded-full mt-4"></div>
</div>
</div>
</body></html>
