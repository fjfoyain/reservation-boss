<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0bdab8",
                        "background-light": "#f5f8f8",
                        "background-dark": "#061110",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Forgot Password - North Highland</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center">
<div class="relative flex h-auto min-h-screen w-full max-w-[480px] flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- TopAppBar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<button aria-label="Go back" class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
</div>
<!-- Content Section -->
<main class="flex-1 flex flex-col px-6 pt-8">
<header class="mb-8">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-[32px] font-bold leading-tight pb-3">
                    Forgot Password?
                </h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed">
                    Enter your @northhighland.com email address and we'll send you a link to reset your password.
                </p>
</header>
<div class="flex flex-col gap-6">
<!-- Email Input Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-200 text-sm font-semibold tracking-wide uppercase" for="email">
                        Email Address
                    </label>
<div class="relative flex items-center">
<input class="form-input w-full rounded-lg text-slate-900 dark:text-white border border-slate-300 dark:border-primary/30 bg-white dark:bg-primary/5 focus:border-primary focus:ring-1 focus:ring-primary h-14 pl-4 pr-12 text-base font-normal placeholder:text-slate-400 dark:placeholder:text-primary/40 transition-all" id="email" placeholder="name@northhighland.com" type="email"/>
<div class="absolute right-4 text-slate-400 dark:text-primary/60 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-[24px]">mail</span>
</div>
</div>
</div>
<!-- Submit Button -->
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-lg h-14 px-5 bg-primary hover:bg-primary/90 text-background-dark text-base font-bold leading-normal tracking-wide transition-colors shadow-lg shadow-primary/10">
<span class="truncate">Send Reset Link</span>
</button>
</div>
<!-- Footer Link -->
<footer class="mt-auto pb-12 pt-8 flex justify-center">
<a class="flex items-center gap-2 text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors text-sm font-medium" href="#">
<span class="material-symbols-outlined text-[18px]">arrow_back_ios</span>
                    Back to Sign In
                </a>
</footer>
</main>
<!-- Decorative Element -->
<div class="absolute top-0 right-0 -z-10 w-64 h-64 bg-primary/5 blur-[100px] rounded-full" data-alt="Abstract teal soft glow pattern"></div>
<div class="absolute bottom-0 left-0 -z-10 w-48 h-48 bg-primary/5 blur-[80px] rounded-full" data-alt="Abstract teal soft glow pattern"></div>
</div>
</body></html>
