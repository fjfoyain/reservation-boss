<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>North Highland Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0bdab8",
                        "background-light": "#f5f8f8",
                        "background-dark": "#10221f",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<div class="flex items-center justify-between p-4 bg-background-light dark:bg-background-dark border-b border-slate-200 dark:border-primary/10">
<button class="flex items-center justify-center p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="text-lg font-bold">Sign In</h1>
<div class="w-10"></div> <!-- Spacer for centering title -->
</div>
<!-- Main Content Container -->
<main class="flex-1 flex flex-col px-6 pt-8 pb-12 max-w-md mx-auto w-full">
<!-- Logo/Branding Section -->
<div class="flex flex-col items-center mb-10">
<div class="w-20 h-20 bg-primary/20 rounded-xl flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-primary text-5xl">corporate_fare</span>
</div>
<h2 class="text-3xl font-bold tracking-tight text-center">North Highland</h2>
<p class="text-slate-500 dark:text-slate-400 mt-2 text-center font-medium">Professional Account Access</p>
</div>
<!-- Login Form -->
<form class="space-y-6">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1" for="email">Work Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full pl-12 pr-4 py-4 rounded-xl border-slate-200 dark:border-primary/20 bg-white dark:bg-background-dark/50 focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none" id="email" placeholder="name@northhighland.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1" for="password">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-12 pr-12 py-4 rounded-xl border-slate-200 dark:border-primary/20 bg-white dark:bg-background-dark/50 focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Remember & Forgot -->
<div class="flex items-center justify-between py-1">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="rounded border-slate-300 dark:border-primary/30 text-primary focus:ring-primary bg-transparent" type="checkbox"/>
<span class="text-sm text-slate-600 dark:text-slate-400 group-hover:text-primary transition-colors">Remember me</span>
</label>
<a class="text-sm font-semibold text-primary hover:underline" href="#">Forgot Password?</a>
</div>
<!-- Primary Login Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-4 rounded-xl transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2" type="submit">
                Login
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- Biometric Option Divider -->
<div class="relative flex py-4 items-center">
<div class="flex-grow border-t border-slate-200 dark:border-primary/10"></div>
<span class="flex-shrink mx-4 text-xs font-bold text-slate-400 uppercase tracking-widest">Or login with</span>
<div class="flex-grow border-t border-slate-200 dark:border-primary/10"></div>
</div>
<!-- Biometric Login Button -->
<button class="w-full border border-slate-200 dark:border-primary/20 bg-white dark:bg-background-dark/30 hover:bg-slate-50 dark:hover:bg-primary/5 py-4 rounded-xl transition-all flex items-center justify-center gap-3" type="button">
<span class="material-symbols-outlined text-primary text-3xl">fingerprint</span>
<span class="font-semibold text-slate-700 dark:text-slate-300">FaceID / TouchID</span>
</button>
</form>
<!-- Footer / Register Link -->
<div class="mt-auto pt-10 text-center">
<p class="text-slate-500 dark:text-slate-400">
                New to North Highland? 
                <a class="text-primary font-bold hover:underline ml-1" href="#">Register Now</a>
</p>
</div>
</main>
<!-- Background Illustration Detail -->
<div class="fixed bottom-0 right-0 p-8 opacity-10 pointer-events-none">
<span class="material-symbols-outlined text-[200px] text-primary">hub</span>
</div>
</body></html>
