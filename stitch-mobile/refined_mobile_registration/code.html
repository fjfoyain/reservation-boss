<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>North Highland Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0bdab8",
                        "background-light": "#f5f8f8",
                        "background-dark": "#10221f",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen font-display">
<div class="relative flex h-full min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined cursor-pointer">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Complete Registration</h2>
</header>
<main class="flex-1 flex flex-col px-6">
<div class="pt-8 pb-6">
<div class="w-12 h-12 bg-primary/20 rounded-xl flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-primary text-3xl">verified_user</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-[32px] font-bold leading-tight pb-3">Welcome to North Highland</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed">Your invitation has been verified. Please complete your profile details to finish setting up your consultant account.</p>
</div>
<form class="flex flex-col gap-5 w-full max-w-[480px]">
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal">
                        Email Address
                    </label>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-slate-400 border border-primary/20 bg-primary/5 h-14 px-4 text-base font-normal leading-normal cursor-not-allowed focus:ring-0 focus:border-primary/20" readonly="" type="email" value="alex.chen@northhighland.com"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-primary">
<span class="material-symbols-outlined text-xl">lock</span>
</div>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal">
                        Full Name
                    </label>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 border border-slate-200 dark:border-primary/30 bg-white dark:bg-background-dark/50 focus:outline-0 focus:ring-2 focus:ring-primary/50 focus:border-primary h-14 px-4 text-base font-normal leading-normal placeholder:text-slate-400 dark:placeholder:text-slate-600" placeholder="e.g. Alex Chen" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal">
                        Create Password
                    </label>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 border border-slate-200 dark:border-primary/30 bg-white dark:bg-background-dark/50 focus:outline-0 focus:ring-2 focus:ring-primary/50 focus:border-primary h-14 px-4 text-base font-normal leading-normal placeholder:text-slate-400 dark:placeholder:text-slate-600" placeholder="Min. 8 characters" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<div class="flex items-start gap-3 py-2">
<div class="flex items-center h-6">
<input class="h-5 w-5 rounded border-slate-300 dark:border-primary/30 bg-white dark:bg-background-dark text-primary focus:ring-primary" id="terms" name="terms" type="checkbox"/>
</div>
<label class="text-sm text-slate-600 dark:text-slate-400 leading-tight" for="terms">
                        I agree to the <a class="text-primary hover:underline" href="#">Terms of Service</a> and <a class="text-primary hover:underline" href="#">Privacy Policy</a> including cookie usage.
                    </label>
</div>
<button class="mt-4 flex w-full items-center justify-center rounded-xl bg-primary px-4 h-14 text-background-dark text-base font-bold transition-all active:scale-[0.98] hover:bg-primary/90" type="submit">
                    Complete Registration
                </button>
</form>
<div class="mt-8 mb-12 flex flex-col items-center justify-center gap-4">
<p class="text-slate-500 dark:text-slate-500 text-sm">
                    Already have an account? <a class="text-primary font-semibold" href="#">Sign In</a>
</p>
</div>
</main>
<footer class="p-6 mt-auto">
<div class="flex items-center justify-center gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-primary"></div>
<div class="w-1.5 h-1.5 rounded-full bg-slate-300 dark:bg-slate-700"></div>
<div class="w-1.5 h-1.5 rounded-full bg-slate-300 dark:bg-slate-700"></div>
</div>
</footer>
</div>
</body></html>
